    <div style="position: relative;">
      <input
        type="text"
        id="searchBox2"
        placeholder="Search..."
        onkeyup="showSuggestions2(this.value)">
      <div id="suggestions2" style="position:absolute; top:100%; left:0; right:0;"></div>
    </div>
    <script>

          "Digital Art Tutorials",
          "Graphic Design Portfolio",
        ];


      async function showSuggestions2(query) {
        const suggestionBox = document.getElementById("suggestions2");
        suggestionBox.innerHTML = "";

        if (query.length === 0) {
          suggestionBox.style.display = "none";
          return;
        }

        const filtered = data.filter(item => item.toLowerCase().includes(query.toLowerCase()));

        if (filtered.length > 0){
            filtered.forEach(s => {
               const div = document.createElement("div");
               div.classList.add("suggestion");
               div.textContent = s;
               div.onclick = () => {
                document.getElementById("searchBox2").value = s;
                suggestionBox.style.display = "none";
               };
               suggestionBox.appendChild(div);
            });
            suggestionBox.style.display = "block";
        } else {
            suggestionBox.style.display ="none";
        }
      }
    </script>
  </body>
</html>
