<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Google-like Search</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
      }
      #searchBox {
        width: 400px;
        padding: 10px;
        border-radius: 25px;
        border: 1px solid #ccc;
        font-size: 16px;
      }
      #suggestions {
        border: 1px solid #ccc;
        border-top: none;
        width: 400px;
        background: #fff;
        position: absolute;
        margin-top: 40px;
        border-radius: 0 0 10px 10px;
        display: none;
      }
      .suggestion {
        padding: 10px;
        cursor: pointer;
      }
      .suggestion:hover {
        background: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <h1>My Search Engine</h1>
    <div style="position: relative">
      <input
        type="text"
        id="searchBox"
        placeholder="Search..."
        onkeyup="showSuggestions(this.value)"
      />
      <div id="suggestions"></div>
    </div>

    <script>
      async function showSuggestions(query) {
    const suggestionBox = document.getElementById("suggestions");
    suggestionBox.innerHTML = "";

    if (!query) {
      suggestionBox.style.display = "none";
      return;
    }

    try {
      // Fetch products from API
      const response = await fetch("https://api.escuelajs.co/api/v1/products");
      const products = await response.json();

      // Filter products by query
      const filtered = products.filter(p =>
        p.title.toLowerCase().includes(query.toLowerCase())
      );

      // Show suggestions
      filtered.forEach(p => {
        const div = document.createElement("div");
        div.classList.add("suggestion");
        div.style.padding = "5px";
        div.style.cursor = "pointer";
        div.innerHTML = `<img src="${p.images[0]}" width="40" style="margin-right:10px;"> ${p.title}`;
        div.onclick = () => {
          document.getElementById("searchBox").value = p.title;
          suggestionBox.style.display = "none";
        };
        suggestionBox.appendChild(div);
      });

      suggestionBox.style.display = filtered.length ? "block" : "none";

    } catch (err) {
      console.error("Error fetching products:", err);
      suggestionBox.style.display = "none";
    }
  }
    </script>
  </body>
</html>
